---
{{- if .Values.monitoring.grafanaDashboard.enabled }}
# Grafana dashboard for machinecfg-controller-netbox-updater.
# Grafana sidecar picks it up automatically via the grafana_dashboard="1" label.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "machinecfg-controller-netbox-updater.fullname" . }}-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "machinecfg-controller-netbox-updater.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  netbox-updater.json: |
    {
      "title": "machinecfg - NetBox Updater Controller",
      "uid": "machinecfg-netbox-updater",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Reconcile Rate (total/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{
            "expr": "rate(controller_runtime_reconcile_total{namespace=\"{{ .Release.Namespace }}\"}[1m])",
            "legendFormat": "{{ "{{" }}controller{{ "}}" }} / {{ "{{" }}result{{ "}}" }}"
          }]
        },
        {
          "id": 2,
          "title": "Reconcile Error Rate (errors/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{
            "expr": "rate(controller_runtime_reconcile_total{namespace=\"{{ .Release.Namespace }}\",result=\"error\"}[1m])",
            "legendFormat": "{{ "{{" }}controller{{ "}}" }}"
          }]
        },
        {
          "id": 3,
          "title": "Work Queue Depth",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [{
            "expr": "workqueue_depth{namespace=\"{{ .Release.Namespace }}\"}",
            "legendFormat": "{{ "{{" }}name{{ "}}" }}"
          }]
        },
        {
          "id": 4,
          "title": "Reconcile Latency (p99, ms)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [{
            "expr": "histogram_quantile(0.99, rate(controller_runtime_reconcile_time_seconds_bucket{namespace=\"{{ .Release.Namespace }}\"}[5m])) * 1000",
            "legendFormat": "{{ "{{" }}controller{{ "}}" }} p99"
          }]
        },
        {
          "id": 5,
          "title": "Controller Up",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 16},
          "targets": [{
            "expr": "up{job=\"netbox-updater\"}",
            "legendFormat": "{{ "{{" }}pod{{ "}}" }}"
          }]
        },
        {
          "id": 6,
          "title": "Leader Election Transitions",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 16},
          "targets": [{
            "expr": "increase(leader_election_master_status{namespace=\"{{ .Release.Namespace }}\"}[5m])",
            "legendFormat": "transitions"
          }]
        }
      ]
    }
{{- end }}
