---
# Role scoped to the controller namespace: ConfigMap, Secret, Lease, Events.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "machinecfg-controller-kubernetes-updater.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "machinecfg-controller-kubernetes-updater.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps, secrets]
    verbs: [get, list, watch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
