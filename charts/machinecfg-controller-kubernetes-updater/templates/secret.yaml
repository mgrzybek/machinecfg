---
{{- if not .Values.netbox.existingSecret }}
# The controller reads this Secret by the fixed name "kubernetes-updater-secret".
# Do not rename without updating the controller source.
# Use netbox.existingSecret to reference a pre-existing Secret instead.
apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-updater-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "machinecfg-controller-kubernetes-updater.labels" . | nindent 4 }}
stringData:
  netbox_token: {{ .Values.netbox.token | required "netbox.token is required when netbox.existingSecret is not set" | quote }}
{{- end }}
