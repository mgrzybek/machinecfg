---
# Service exposing the Prometheus metrics endpoint for scraping.
apiVersion: v1
kind: Service
metadata:
  name: netbox-updater
  namespace: machinecfg-system
  labels:
    app: netbox-updater
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: /metrics
spec:
  selector:
    app: netbox-updater
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
  type: ClusterIP
