---
# Grafana dashboard for machinecfg-controller-netbox-updater.
# Deploy as a ConfigMap and configure Grafana sidecar to pick it up automatically.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox-updater-grafana-dashboard
  namespace: machinecfg-system
  labels:
    app: netbox-updater
    grafana_dashboard: "1"
data:
  netbox-updater.json: |
    {
      "title": "machinecfg - NetBox Updater Controller",
      "uid": "machinecfg-netbox-updater",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Reconcile Rate (total/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{
            "expr": "rate(controller_runtime_reconcile_total{namespace=\"machinecfg-system\"}[1m])",
            "legendFormat": "{{controller}} / {{result}}"
          }]
        },
        {
          "id": 2,
          "title": "Reconcile Error Rate (errors/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{
            "expr": "rate(controller_runtime_reconcile_total{namespace=\"machinecfg-system\",result=\"error\"}[1m])",
            "legendFormat": "{{controller}}"
          }]
        },
        {
          "id": 3,
          "title": "Work Queue Depth",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [{
            "expr": "workqueue_depth{namespace=\"machinecfg-system\"}",
            "legendFormat": "{{name}}"
          }]
        },
        {
          "id": 4,
          "title": "Reconcile Latency (p99, ms)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [{
            "expr": "histogram_quantile(0.99, rate(controller_runtime_reconcile_time_seconds_bucket{namespace=\"machinecfg-system\"}[5m])) * 1000",
            "legendFormat": "{{controller}} p99"
          }]
        },
        {
          "id": 5,
          "title": "Controller Up",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 16},
          "targets": [{
            "expr": "up{job=\"netbox-updater\"}",
            "legendFormat": "{{pod}}"
          }]
        },
        {
          "id": 6,
          "title": "Leader Election Transitions",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 16},
          "targets": [{
            "expr": "increase(leader_election_master_status{namespace=\"machinecfg-system\"}[5m])",
            "legendFormat": "transitions"
          }]
        }
      ]
    }
