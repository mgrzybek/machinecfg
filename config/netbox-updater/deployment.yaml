---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbox-updater
  namespace: machinecfg-system
  labels:
    app: netbox-updater
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netbox-updater
  template:
    metadata:
      labels:
        app: netbox-updater
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: netbox-updater
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: controller
          image: machinecfg-controller-netbox-updater:latest
          command: ["/bin/controller-netbox-updater"]
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: CONTROLLER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LEADER_ELECT
              value: "true"
            # Autotune: GOMAXPROCS is set from the container CPU limit.
            - name: LIMITS_CPU
              valueFrom:
                resourceFieldRef:
                  containerName: controller
                  resource: limits.cpu
                  divisor: "1"
            - name: LIMITS_MEMORY
              valueFrom:
                resourceFieldRef:
                  containerName: controller
                  resource: limits.memory
                  divisor: "1Mi"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
